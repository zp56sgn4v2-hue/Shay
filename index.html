<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShayDex Launch V2.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Inter,system-ui,sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}
body:before,body:after{
content:'';position:fixed;border-radius:50%;
filter:blur(120px);z-index:-1;
}
body:before{width:500px;height:500px;background:#7c3aed33;left:-150px;top:-100px}
body:after{width:450px;height:450px;background:#06b6d433;right:-150px;top:0}

.hero{
padding:50px 20px 30px;
text-align:center;
max-width:1100px;
margin:auto;
}
.hero h1{
font-size:clamp(3rem,10vw,6rem);
line-height:1;
font-weight:900;
background:linear-gradient(90deg,#facc15,#f472b6,#60a5fa);
-webkit-background-clip:text;
color:transparent;
}
.hero p{color:#94a3b8;margin-top:10px}

.featured{
max-width:1100px;
margin:20px auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
}
.featured img{
width:100%;
max-width:320px;
height:auto;
display:block;
margin:auto;
border-radius:20px;
}

.stats{
max-width:1100px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
padding:0 20px;
}
.stat{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
text-align:center;
}
.stat b{display:block;font-size:2rem}

.controls{
position:sticky;
top:10px;
z-index:500;
width:min(95%,1100px);
margin:20px auto;
padding:16px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
background:rgba(5,8,22,.85);
backdrop-filter:blur(20px);
border-radius:24px;
}
input,select{
padding:14px 18px;
border:none;
border-radius:16px;
background:rgba(255,255,255,.08);
color:white;
}

.grid{
max-width:1700px;
margin:auto;
padding:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:24px;
}
.card{
background:rgba(255,255,255,.05);
border-radius:28px;
overflow:hidden;
transition:.3s;
}
.card:hover{
transform:translateY(-8px) scale(1.02);
}
.card img{width:100%;display:block}
.info{padding:16px}
.number{color:#94a3b8}
.name{font-weight:800}

footer{
max-width:1100px;
margin:30px auto;
padding:20px;
text-align:center;
color:#94a3b8;
}

@media (max-width:768px){
.featured{
grid-template-columns:1fr;
text-align:center;
}
.featured h2{
font-size:2rem!important;
}
.stats{
grid-template-columns:repeat(2,1fr);
}
.controls{
flex-direction:column;
}
input,select{
width:100%;
}
}
</style>
</head>
<body>

<div class="hero">
<h1>SHAYDEX</h1>
<p>The Official Shaylen Trading Card Archive</p>
</div>

<div class="featured">
<div style="text-align:center">
<img src="card_8.PNG" onerror="this.src='card_8.png'">
</div>
<div style="display:flex;flex-direction:column;justify-content:center">
<div style="color:#94a3b8">FEATURED SHAYLEN</div>
<h2 style="font-size:3rem">Dragon Shaylen</h2>
<p>Secret Rare</p>
</div>
</div>

<div class="stats">
<div class="stat"><b>17</b>Cards</div>
<div class="stat"><b>6</b>Basic</div>
<div class="stat"><b>5</b>Rare</div>
<div class="stat"><b>4</b>Secret Rare</div>
<div class="stat"><b>1</b>Eternal Legend</div>
</div>

<div class="controls">
<input placeholder="Search cards...">
<select><option>All Types</option></select>
</div>

<footer>ShayDex Archive • Launch V2.1 Layout Fix</footer>

</body>
</html>
