<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ShayDex — The Gallery</title>
<meta name="description" content="The official Shaylen trading card archive. A clean gallery of every Shaylen card.">

<meta property="og:type" content="website">
<meta property="og:title" content="ShayDex — The Gallery">
<meta property="og:description" content="The official Shaylen trading card archive. A clean gallery of every Shaylen card.">
<meta property="og:image" content="https://REPLACE-WITH-YOUR-DOMAIN.com/shaydex-og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ShayDex — The Gallery">
<meta name="twitter:description" content="The official Shaylen trading card archive. A clean gallery of every Shaylen card.">
<meta name="twitter:image" content="https://REPLACE-WITH-YOUR-DOMAIN.com/shaydex-og.png">
<meta name="theme-color" content="#0a0a0a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --accent: #f5c842;
  --text: #f8f8f8;
  --text-dim: #888888;
  --card-bg: #111111;
  --card-border: #222222;
  --overlay: rgba(10,10,10,0.92);
  --r: 14px;
  --font: 'Space Grotesk', system-ui, -apple-system, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Slim Editorial Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.96);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #222;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left {
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.logo {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -.025em;
  color: var(--accent);
}
.card-count {
  font-size: .82rem;
  color: var(--text-dim);
  font-weight: 400;
}
.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}
.icon-btn {
  width: 44px;
  height: 44px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 999px;
  transition: all .15s ease;
}
.icon-btn:hover {
  background: #1a1a1a;
  color: var(--accent);
}
.icon-btn.active {
  color: var(--accent);
}

/* New Drops Strip */
.new-drops {
  padding: 28px 24px 20px;
  border-bottom: 1px solid #222;
}
.new-drops h2 {
  font-size: .95rem;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.drops-strip {
  display: flex;
  gap: 18px;
  overflow-x: auto;
  padding-bottom: 10px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.drops-strip::-webkit-scrollbar { display: none; }

.flip-card {
  flex: 0 0 162px;
  height: 227px;
  perspective: 1400px;
  scroll-snap-align: start;
  cursor: pointer;
}
.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.65s cubic-bezier(.23,1.0,.32,1);
  transform-style: preserve-3d;
  will-change: transform;
}
.flip-card.flipped .flip-card-inner {
  transform: rotateY(180deg);
}
.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: 0 12px 35px rgba(0,0,0,.65);
  border: 1px solid #2a2a2a;
}
.flip-card-front {
  background: #121212;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.flip-card-front::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(45deg, rgba(255,255,255,.04) 25%, transparent 25%) 0 0 / 22px 22px,
    linear-gradient(-45deg, rgba(255,255,255,.025) 25%, transparent 25%) 0 0 / 22px 22px;
  background-repeat: repeat;
  z-index: 0;
}
.flip-card-front .logo {
  font-size: 3.8rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.1em;
  text-shadow: 0 0 50px rgba(245,200,66,.35);
  z-index: 1;
  position: relative;
}
.flip-card-back {
  transform: rotateY(180deg);
  background: #111;
}
.flip-card-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Main Gallery */
.gallery-header {
  padding: 28px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.gallery-header h2 {
  font-size: 1.05rem;
  font-weight: 500;
}
.gallery-header .count {
  font-size: .88rem;
  color: var(--text-dim);
}

.grid {
  padding: 0 24px 70px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(162px, 1fr));
  gap: 14px;
}
@media (min-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(auto-fill, minmax(188px, 1fr)); } }
@media (min-width: 1200px) { .grid { grid-template-columns: repeat(auto-fill, minmax(198px, 1fr)); } }

.card {
  position: relative;
  aspect-ratio: 5 / 7;
  border-radius: var(--r);
  overflow: hidden;
  background: #111;
  border: 1px solid var(--card-border);
  box-shadow: 0 6px 22px rgba(0,0,0,.45);
  transition: transform .22s cubic-bezier(.23,1,.32,1), box-shadow .22s ease;
  cursor: pointer;
}
@media (hover: hover) {
  .card:hover {
    transform: translateY(-7px);
    box-shadow: 0 22px 50px rgba(0,0,0,.6);
  }
  .card:hover img {
    transform: scale(1.018);
  }
  .card .info {
    transform: translateY(100%);
  }
  .card:hover .info {
    transform: translateY(0);
  }
}

/* Always show info on touch devices */
@media (hover: none) {
  .card .info {
    transform: translateY(0);
    background: linear-gradient(transparent, rgba(10,10,10,0.88) 30%);
  }
  .card .fav {
    opacity: 0.9;
  }
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .55s ease;
}

/* Hover info overlay */
.card .info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 15px 14px;
  background: linear-gradient(transparent, rgba(10,10,10,0.92) 38%);
  transition: transform .22s cubic-bezier(.23,1,.32,1);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.card .info strong {
  font-size: 1.02rem;
  font-weight: 600;
  line-height: 1.15;
}
.card .info .rarity {
  font-size: .7rem;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: .6px;
}

/* Favorite heart */
.card .fav {
  position: absolute;
  top: 11px;
  right: 11px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(0,0,0,.7);
  color: #fff;
  font-size: 1.05rem;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all .2s ease;
  z-index: 2;
  cursor: pointer;
}
@media (hover: none) {
  .card .fav { opacity: 0.85; }
}
.card:hover .fav,
.card .fav.favorited {
  opacity: 1;
}
.card .fav.favorited {
  color: #f87171;
}

/* Search Overlay */
#searchOverlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  backdrop-filter: blur(22px);
  z-index: 200;
  display: none;
  align-items: flex-start;
  padding-top: 90px;
}
#searchOverlay.open { display: flex; }
.search-inner {
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px;
}
#searchInput {
  width: 100%;
  background: #111;
  border: 1px solid #333;
  color: var(--text);
  font-size: 1.3rem;
  padding: 18px 24px;
  border-radius: 999px;
  outline: none;
  font-family: inherit;
}
#searchInput::placeholder { color: #555; }
#searchResults {
  margin-top: 20px;
  max-height: 58vh;
  overflow-y: auto;
}

/* Fullscreen Lightbox */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.96);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 36px 20px;
}
#lightbox.open { display: flex; }
.lightbox-content {
  max-width: 880px;
  width: 100%;
  text-align: center;
}
.lightbox-content img {
  max-height: 70vh;
  max-width: 100%;
  border-radius: 18px;
  box-shadow: 0 35px 90px rgba(0,0,0,.75);
  margin-bottom: 22px;
}
.lightbox-info {
  font-size: 1.2rem;
  margin-bottom: 6px;
}
.lightbox-info .rarity {
  color: var(--accent);
  font-size: .92rem;
  margin-top: 5px;
}
.lightbox-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #fff;
  font-size: 1.7rem;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .2s ease;
  z-index: 10;
}
.lightbox-nav:hover { background: #222; border-color: var(--accent); }
.lightbox-nav.prev { left: 22px; }
.lightbox-nav.next { right: 22px; }
#lightboxClose {
  position: fixed;
  top: 26px;
  right: 26px;
  width: 46px;
  height: 46px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #fff;
  font-size: 1.5rem;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--text-dim);
  font-size: 1rem;
}

/* Subtle gold pulse for unrevealed new drops */
.pulse {
  animation: goldPulse 3s ease-in-out infinite;
}
@keyframes goldPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(245,200,66,.12); }
  50% { box-shadow: 0 0 0 16px rgba(245,200,66,0); }
}

.footer {
  text-align: center;
  padding: 50px 20px 35px;
  font-size: .78rem;
  color: #555;
  letter-spacing: .6px;
}

/* V3.6 Mystery Overhaul */
.flip-card{cursor:pointer}
.flip-card-inner{transition:opacity .45s ease, transform .45s ease !important}
.flip-card.revealed .flip-card-inner{transform:none !important}
.reveal-glow{
  animation:revealGlow 1s ease;
}
@keyframes revealGlow{
  0%{filter:brightness(1)}
  50%{filter:brightness(1.6) drop-shadow(0 0 20px gold)}
  100%{filter:brightness(1)}
}
.discovery-pill{
  display:inline-block;
  margin-bottom:12px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(245,200,66,.12);
  color:#f5c842;
  font-size:.8rem;
}

</style>
</head>
<body>

<!-- Slim Header -->
<header>
  <div class="header-left">
    <div class="logo">SHAYDEX</div>
    <div class="card-count" id="headerCount">25 cards</div>
  </div>
  
  <div class="header-actions">
    <button class="icon-btn" id="searchBtn" aria-label="Search">🔍</button>
    <button class="icon-btn" id="collectionBtn" aria-label="Toggle collection">❤</button>
    <button class="icon-btn" id="shareBtn" aria-label="Share">↗</button>
  </div>
</header>

<!-- New Drops -->
<section class="new-drops" id="newDropsSection">
  <h2>New Drops</h2><div id="discoveryTracker" class="discovery-pill"></div>
  <div class="drops-strip" id="dropsStrip"></div>
</section>

<!-- Main Gallery -->
<section>
  <div class="gallery-header">
    <h2 id="galleryTitle">The Collection</h2>
    <div class="count" id="galleryCount"></div>
  </div>
  
  <div id="grid" class="grid"></div>
  
  <div id="emptyState" class="empty" hidden>
    No cards in your collection yet.<br>
    Tap the heart on any card to save it.
  </div>
</section>

<div class="footer">ShayDex v3 — The Gallery &nbsp;·&nbsp; Pure card viewing</div>

<!-- Search Overlay -->
<div id="searchOverlay">
  <div class="search-inner">
    <input type="text" id="searchInput" placeholder="Search cards by name or rarity…" autocomplete="off">
    <div id="searchResults"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightboxClose">✕</button>
  <button class="lightbox-nav prev" id="lbPrev">‹</button>
  <div class="lightbox-content">
    <img id="lbImg" alt="">
    <div class="lightbox-info">
      <div id="lbName"></div>
      <div class="rarity" id="lbRarity"></div>
    </div>
  </div>
  <button class="lightbox-nav next" id="lbNext">›</button>
</div>

<script>
(function(){
"use strict";

const cards = [
  ['1','Silly Shaylen','Basic'],['2','Beaver Shaylen','Rare'],['3','Sandy Shaylen','Rare'],
  ['4','Panda Shaylen','Rare'],['5',"Cheesin' Shaylen",'Rare'],['6','Princess Shaylen','Secret Rare'],
  ['7','Pickle Shaylen','Rare'],['8','Dragon Shaylen','Secret Rare'],['9','Bald Shaylen','Basic'],
  ['10','Shuggie','Secret Rare'],['11','Baby Shaylen','Basic'],['12','Christmas Shaylen','Eternal Legend'],
  ['13','Devious Shaylen','Secret Rare'],['14','Shocker Shaylen','Basic'],['15','Evil Shaylen','Dark'],
  ['16','Innocent Shaylen','Basic'],['17','Hefty Shaylen','Basic'],
  ['18','Groovin’ Shaylen','Rare'],['19','Hungry Shaylen','Basic'],['20','Hangry Shaylen','Rare'],
  ['21','Sunburnt Shaylen','Secret Rare'],['22','Nature Shaylen','Rare'],
  ['23','Shaylen And The Bros','Secret Rare'],['24','Bizarre Shaylen','Rare'],['25','Grafiti Shaylen','Rare']
].sort((a,b) => Number(b[0]) - Number(a[0]));

const MYSTERY_IDS = new Set(['23','24','25']);
const RARITY_COLOR = {Basic:'#9aa3bb',Rare:'#60a5fa','Secret Rare':'#b388ff','Eternal Legend':'#facc15',Dark:'#f87171'};

const FAV_KEY = 'shaydexFavorites_v3';
const REVEAL_KEY = 'shaydexRevealed_v3';
let favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));
let revealed = new Set(JSON.parse(localStorage.getItem(REVEAL_KEY) || '[]'));

let showCollection = false;
let currentLightboxIndex = -1;

/* ---------- Image loader ---------- */
const imgCache = {};
function loadSmart(img, base) {
  if (imgCache[base]) { img.src = imgCache[base]; return; }

  const tries = [
    base+'.jpeg', base+'.JPEG',
    base+'.jpg',  base+'.JPG',
    base+'.png',  base+'.PNG',
    base+'.webp', base+'.WEBP'
  ];

  let i = 0;

  function tryNext() {
    if (i >= tries.length) return;

    const src = tries[i];
    const probe = new Image();

    probe.onload = () => {
      imgCache[base] = src;
      img.src = src;
    };

    probe.onerror = () => {
      i++;
      tryNext();
    };

    probe.src = src;
  }

  tryNext();
}

/* ---------- Render New Drops ---------- */
function renderNewDrops() {
  const container = document.getElementById('dropsStrip');
  const section = document.getElementById('newDropsSection');
  
  const unrevealed = cards.filter(c => MYSTERY_IDS.has(c[0]));
  
  section.style.display = '';
  
  container.innerHTML = unrevealed.map(c => {
    const id = c[0];
    const flipped = revealed.has(id) ? "flipped" : "";
    return `
      <div class="flip-card ${flipped} pulse" data-id="${id}">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <div class="logo">S</div>
          </div>
          <div class="flip-card-back">
            <img data-base="card_${id}" alt="${c[1]}">
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.flip-card').forEach(cardEl => {
    const id = cardEl.dataset.id;
    const img = cardEl.querySelector('img');
    if (img) loadSmart(img, 'card_' + id);

    cardEl.addEventListener('click', () => {
      if (revealed.has(id)) return;
      cardEl.classList.add('flipped');
      
      setTimeout(() => {
        revealed.add(id);
        localStorage.setItem(REVEAL_KEY, JSON.stringify([...revealed]));
        renderGallery(); updateDiscoveryTracker();
        renderNewDrops(); updateDiscoveryTracker();
        
        setTimeout(() => {
          const idx = cards.findIndex(c => c[0] === id);
          if (idx !== -1) openLightbox(idx);
        }, 380);
      }, 680);
    });
  });
}

/* ---------- Render Main Gallery ---------- */
function renderGallery() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const title = document.getElementById('galleryTitle');
  const countEl = document.getElementById('galleryCount');

  let visibleCards = cards.filter(c => {
    const isMystery = MYSTERY_IDS.has(c[0]);
    if (isMystery && !revealed.has(c[0])) return false;
    if (showCollection && !favs.has(c[0])) return false;
    return true;
  });

  if (visibleCards.length === 0) {
    grid.innerHTML = '';
    empty.hidden = false;
    countEl.textContent = '';
    return;
  }
  empty.hidden = true;

  title.textContent = showCollection ? 'Your Collection' : 'The Collection';
  countEl.textContent = `${visibleCards.length} cards`;

  grid.innerHTML = visibleCards.map(c => {
    const id = c[0], name = c[1], rarity = c[2];
    const isFav = favs.has(id);
    return `
      <div class="card" data-id="${id}" data-rarity="${rarity}">
        <img data-base="card_${id}" alt="${name}" decoding="async">
        <div class="info">
          <strong>${name}</strong>
          <div class="rarity">${rarity}</div>
        </div>
        <button class="fav ${isFav ? 'favorited' : ''}" aria-label="Toggle favorite">❤</button>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('img[data-base]').forEach(img => loadSmart(img, img.dataset.base));

  grid.querySelectorAll('.card').forEach(cardEl => {
    const id = cardEl.dataset.id;
    
    cardEl.addEventListener('click', (e) => {
      if (e.target.classList.contains('fav')) return;
      const idx = cards.findIndex(c => c[0] === id);
      if (idx !== -1) openLightbox(idx);
    });

    const favBtn = cardEl.querySelector('.fav');
    favBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (favs.has(id)) favs.delete(id); else favs.add(id);
      localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
      renderGallery(); updateDiscoveryTracker();
    });
  });
}

/* ---------- Lightbox with fixes ---------- */
function openLightbox(index) {
  currentLightboxIndex = index;
  const c = cards[index];
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');
  
  loadSmart(img, 'card_' + c[0]);
  document.getElementById('lbName').textContent = c[1];
  document.getElementById('lbRarity').innerHTML = `<span style="color:${RARITY_COLOR[c[2]]}">${c[2]}</span>`;
  
  lb.classList.add('open');
}

function navigateLightbox(dir) {
  let next = currentLightboxIndex + dir;
  while (next >= 0 && next < cards.length) {
    const c = cards[next];
    if (!MYSTERY_IDS.has(c[0]) || revealed.has(c[0])) {
      currentLightboxIndex = next;
      openLightbox(currentLightboxIndex);
      return;
    }
    next += dir;
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ---------- Search ---------- */
const searchBtn = document.getElementById('searchBtn');
const searchOverlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchBtn.onclick = () => {
  searchOverlay.style.display = 'flex';
  searchInput.focus();
  searchInput.value = '';
  searchResults.innerHTML = '';
};

searchOverlay.onclick = (e) => { if (e.target === searchOverlay) searchOverlay.style.display = 'none'; };

searchInput.oninput = () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { searchResults.innerHTML = ''; return; }
  
  const results = cards.filter(c => {
    if (MYSTERY_IDS.has(c[0]) && !revealed.has(c[0])) return false;
    return c[1].toLowerCase().includes(q) || c[2].toLowerCase().includes(q);
  });
  
  searchResults.innerHTML = results.length ? results.map(c => {
    const idx = cards.findIndex(x => x[0] === c[0]);
    return `<div style="padding:13px 18px;border-bottom:1px solid #222;cursor:pointer;display:flex;gap:14px;align-items:center" onclick="document.getElementById('searchOverlay').style.display='none'; openLightbox(${idx})">
      <div style="width:48px;height:67px;background:#222;border-radius:6px;overflow:hidden;flex-shrink:0">
        <img data-base="card_${c[0]}" style="width:100%;height:100%;object-fit:cover" decoding="async">
      </div>
      <div><div style="font-weight:600">${c[1]}</div><div style="color:#f5c842;font-size:.82rem;margin-top:1px">${c[2]}</div></div>
    </div>`;
  }).join('') : `<div style="padding:18px;color:#666">No matches.</div>`;
  
  searchResults.querySelectorAll('img[data-base]').forEach(img => loadSmart(img, img.dataset.base));
};

/* ---------- Collection Toggle ---------- */
const collectionBtn = document.getElementById('collectionBtn');
collectionBtn.onclick = () => {
  showCollection = !showCollection;
  collectionBtn.classList.toggle('active', showCollection);
  renderGallery(); updateDiscoveryTracker();
};

/* ---------- Share ---------- */
document.getElementById('shareBtn').onclick = async () => {
  const data = { title: 'ShayDex — The Gallery', text: 'Clean gallery of every Shaylen card.', url: location.href };
  if (navigator.share) { try { await navigator.share(data); } catch(e){} }
  else {
    try { await navigator.clipboard.writeText(location.href);
      const t = document.createElement('div'); t.textContent = 'Link copied!'; t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:999px;font-size:.82rem';
      document.body.appendChild(t); setTimeout(()=>t.remove(),1500);
    } catch(e){}
  }
};

/* ---------- Init with lightbox listeners ---------- */
window.openLightbox = openLightbox;

function init() {
  document.getElementById('headerCount').textContent = `${cards.length} cards`;
  
  renderNewDrops(); updateDiscoveryTracker();
  renderGallery(); updateDiscoveryTracker();
  
  // Lightbox event listeners
  document.getElementById('lightboxClose').onclick = closeLightbox;
  document.getElementById('lbPrev').onclick = () => navigateLightbox(-1);
  document.getElementById('lbNext').onclick = () => navigateLightbox(1);
  
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('open')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    }
    if (e.key === 'Escape' && searchOverlay.style.display === 'flex') searchOverlay.style.display = 'none';
    if (e.key === '/' && document.activeElement.tagName === 'BODY') { e.preventDefault(); searchBtn.click(); }
  });
  
  // Close lightbox on background click
  document.getElementById('lightbox').onclick = (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  };
}

init();

})();
</script>
