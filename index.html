<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShayDex Premium V5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050816;--bg2:#0f172a;--glass:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);--muted:#94a3b8;
}
body{
font-family:Inter,system-ui,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:white;overflow-x:hidden;min-height:100vh;
}
body:before,body:after{
content:"";position:fixed;border-radius:50%;filter:blur(140px);z-index:-1;
}
body:before{width:500px;height:500px;background:#7c3aed33;left:-150px;top:-100px}
body:after{width:450px;height:450px;background:#06b6d433;right:-150px;top:0}

.hero{text-align:center;padding:50px 20px 20px}
.hero h1{
font-size:clamp(3rem,12vw,7rem);
font-weight:900;
background:linear-gradient(90deg,#facc15,#f472b6,#60a5fa);
-webkit-background-clip:text;color:transparent;
}
.hero p{color:var(--muted)}
.glass{
width:min(94%,1200px);margin:18px auto;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(20px);
border-radius:28px;
}
.featured{padding:24px;text-align:center}
.controls{display:flex;gap:12px;flex-wrap:wrap;padding:18px}
input,select,button{
padding:14px;border-radius:16px;border:none;
background:rgba(255,255,255,.08);color:white;
}
button{cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:18px}
.stat{text-align:center;background:rgba(255,255,255,.04);padding:16px;border-radius:18px}
.stat b{display:block;font-size:1.8rem}

.grid{width:min(95%,1500px);margin:20px auto;display:grid;gap:20px}
.grid.gridview{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.grid.showcase{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.grid.binder{grid-template-columns:repeat(3,1fr)}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;overflow:hidden;
transform-style:preserve-3d;
transition:.2s;
position:relative;
}
.card img{width:100%;display:block}
.card:hover{box-shadow:0 25px 50px rgba(0,0,0,.5)}
.card:before{
content:"";position:absolute;inset:0;
background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);
transform:translateX(-120%);
transition:1s;
pointer-events:none;
}
.card:hover:before{transform:translateX(120%)}
.secret{box-shadow:0 0 25px rgba(250,204,21,.25)}
.eternal{box-shadow:0 0 35px rgba(255,215,0,.35)}
.dark{box-shadow:0 0 25px rgba(0,0,0,.8)}
.info{padding:14px}
.type{color:#94a3b8;font-size:.9rem}

.achievements{padding:18px}
.badge{
display:inline-block;
margin:6px;
padding:8px 12px;
border-radius:999px;
background:rgba(255,255,255,.08);
}

.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
justify-content:center;align-items:center;z-index:9999;padding:20px;
}
.modal img{max-width:500px;max-height:85vh;border-radius:20px}

@media(max-width:768px){
.stats{grid-template-columns:repeat(2,1fr)}
.grid.binder{grid-template-columns:repeat(2,1fr)}
.controls>*{width:100%}
}
</style>
</head>
<body>

<div class="hero">
<h1>SHAYDEX</h1>
<p>The Official Shaylen Trading Card Archive</p>
</div>

<div class="glass featured">
<h2>✨ Premium Edition</h2>
<p>Grid • Showcase • Binder Views • 3D Cards • Achievements</p>
</div>

<div class="glass controls">
<input id="search" placeholder="Search by name, number, rarity..." onkeyup="filterCards()">
<select id="view" onchange="changeView()">
<option value="gridview">Grid View</option>
<option value="showcase">Showcase View</option>
<option value="binder">Binder View</option>
</select>
</div>

<div class="glass stats">
<div class="stat"><b>17</b>Cards</div>
<div class="stat"><b>6</b>Basic</div>
<div class="stat"><b>5</b>Rare</div>
<div class="stat"><b>4</b>Secret</div>
<div class="stat"><b>1</b>Legend</div>
</div>

<div class="glass achievements">
<strong>Achievements</strong><br>
<span class="badge">👀 First Visit</span>
<span class="badge">⭐ Collector</span>
<span class="badge">👑 Found Eternal Legend</span>
</div>

<div class="grid gridview" id="grid"></div>

<div class="modal" id="modal"><img id="modalImg"></div>

<script>
const cards=[
['1','Silly Shaylen','Basic'],['2','Beaver Shaylen','Rare'],
['3','Sandy Shaylen','Rare'],['4','Panda Shaylen','Rare'],
['5',"Cheesin' Shaylen",'Rare'],['6','Princess Shaylen','Secret Rare'],
['7','Pickle Shaylen','Rare'],['8','Dragon Shaylen','Secret Rare'],
['9','Bald Shaylen','Basic'],['10','Shuggie','Secret Rare'],
['11','Baby Shaylen','Basic'],['12','Christmas Shaylen','Eternal Legend'],
['13','Devious Shaylen','Secret Rare'],['14','Shocker Shaylen','Basic'],
['15','Evil Shaylen','Dark'],['16','Innocent Shaylen','Basic'],
['17','Hefty Shaylen','Basic']
];

function loadSmart(img,b){
const t=[b+'.jpeg',b+'.JPEG',b+'.jpg',b+'.JPG',b+'.png',b+'.PNG',b+'.webp',b+'.WEBP'];
let i=0;(function n(){if(i>=t.length)return;img.onerror=()=>{i++;n()};img.src=t[i]})();}

function render(){
grid.innerHTML=cards.map(c=>{
let cls='';
if(c[2]=='Secret Rare')cls='secret';
if(c[2]=='Eternal Legend')cls='eternal';
if(c[2]=='Dark')cls='dark';
return `<div class="card ${cls}" data-search="${c.join(' ').toLowerCase()}">
<img data-base="card_${c[0]}">
<div class="info"><b>${c[1]}</b><div class="type">${c[2]}</div>
<div style="font-size:.85rem;color:#94a3b8;margin-top:6px">Lore: A legendary entry in the ShayDex universe.</div>
</div></div>`;
}).join('');
document.querySelectorAll('[data-base]').forEach(i=>loadSmart(i,i.dataset.base));

document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove',e=>{
const r=card.getBoundingClientRect();
const x=(e.clientX-r.left)/r.width-.5;
const y=(e.clientY-r.top)/r.height-.5;
card.style.transform=`rotateY(${x*12}deg) rotateX(${-y*12}deg) scale(1.03)`;
});
card.addEventListener('mouseleave',()=>card.style.transform='');
});
}
render();

function filterCards(){
const q=document.getElementById('search').value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.dataset.search.includes(q)?'':'none';
});
}

function changeView(){
grid.className='grid '+document.getElementById('view').value;
}

document.addEventListener('click',e=>{
if(e.target.matches('.card img')){
modal.style.display='flex';
modalImg.src=e.target.src;
localStorage.setItem('shaydex_viewed','true');
}
});
modal.onclick=()=>modal.style.display='none';
</script>
</body>
</html>
