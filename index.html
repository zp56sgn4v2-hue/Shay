<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAYDEX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#020202;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

body:before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,190,60,.12) 0%,
rgba(255,190,60,.03) 25%,
transparent 60%);
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

.logo{
font-size:clamp(3.5rem,10vw,6rem);
font-weight:900;
letter-spacing:-2px;
background:linear-gradient(180deg,#ffd86b,#d9a73b,#f6d37a);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(255,210,100,.18);
}

.subtitle{
margin-top:10px;
font-size:.8rem;
letter-spacing:6px;
color:rgba(255,255,255,.45);
}

.line{
width:220px;
height:1px;
margin:40px auto;
background:linear-gradient(90deg,transparent,#d9a73b,transparent);
}

.date{
font-size:clamp(1.8rem,5vw,3rem);
font-weight:700;
letter-spacing:10px;
color:#f3d37b;
animation:pulse 4s ease-in-out infinite;
}

.time{
margin-top:18px;
font-size:clamp(1.1rem,2vw,1.5rem);
letter-spacing:8px;
color:rgba(255,255,255,.85);
}

.footer{
position:absolute;
bottom:40px;
left:0;
right:0;
text-align:center;
font-size:.75rem;
letter-spacing:5px;
color:rgba(255,255,255,.18);
}

@keyframes pulse{
0%,100%{
opacity:.65;
text-shadow:0 0 8px rgba(255,210,100,.2);
}
50%{
opacity:1;
text-shadow:
0 0 15px rgba(255,210,100,.5),
0 0 35px rgba(255,210,100,.25);
}
}
</style>
</head>
<body>
<div class="container">
<div class="logo">SHAYDEX</div>
<div class="subtitle">UNDER CONSTRUCTION</div>
<div class="line"></div>
<div class="date">06 • 22 • 26</div>
<div class="time">6:00 P.M.</div>
</div>
<div class="footer">SOMETHING IS COMING.</div>
</body>
</html>
